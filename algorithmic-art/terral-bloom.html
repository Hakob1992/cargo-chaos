<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terral Bloom — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js" integrity="sha512-bcfltY+lNLlNxz38yBBm/HLaUB1gTV6I0e+fahbF9pS6roIdzUytozWdnFV8ZnM6cSAG5EbmO0ag0a/fLZSG4Q==" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark:       #141413;
            --anthropic-light:      #faf9f5;
            --anthropic-mid-gray:   #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange:     #d97757;
            --anthropic-blue:       #6a9bcc;
            --anthropic-green:      #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }

        /* Sidebar */
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 13px; margin-bottom: 28px; line-height: 1.5; }
        .control-section { margin-bottom: 28px; }
        .control-section h3 {
            font-size: 15px; font-weight: 600; color: var(--anthropic-dark);
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }

        /* Seed */
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray); text-align: center; color: var(--anthropic-dark);
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217,119,87,0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }

        /* Controls */
        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; font-size: 13px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 7px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--anthropic-light-gray);
            border-radius: 2px; outline: none; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px; background: var(--anthropic-orange);
            border-radius: 50%; border: none; cursor: pointer;
        }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 42px; text-align: right; }

        /* Buttons */
        .button {
            background: var(--anthropic-orange); color: white; border: none;
            padding: 10px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; width: 100%; font-family: 'Poppins', sans-serif;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }

        /* Canvas */
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container {
            width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(20,20,19,0.15); background: #0f0c09;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading {
            display: flex; align-items: center; justify-content: center;
            min-height: 600px; font-size: 16px; color: #a09080;
            font-family: 'Lora', serif; font-style: italic; letter-spacing: 0.5px;
        }

        /* Wheel legend */
        .wheel-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        .wl-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--anthropic-mid-gray); }
        .wl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        @media (max-width: 640px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <h1>Terral Bloom</h1>
        <div class="subtitle">Four contact points disturb the earth. Matter rises, drifts, and records the passage of invisible force.</div>

        <!-- Seed -->
        <div class="control-section">
            <h3>Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button secondary" onclick="previousSeed()">← Prev</button>
                <button class="button secondary" onclick="nextSeed()">Next →</button>
            </div>
            <button class="button tertiary" style="margin-bottom:0" onclick="randomSeedAndUpdate()">↻ Random</button>
        </div>

        <!-- Parameters -->
        <div class="control-section">
            <h3>Parameters</h3>

            <div class="control-group">
                <label>Formation Speed</label>
                <div class="slider-container">
                    <input type="range" id="speed" min="0.4" max="4.0" step="0.1" value="1.8" oninput="updateParam('speed', this.value)">
                    <span class="value-display" id="speed-value">1.8</span>
                </div>
            </div>

            <div class="control-group">
                <label>Emit Rate</label>
                <div class="slider-container">
                    <input type="range" id="emitRate" min="1" max="10" step="1" value="4" oninput="updateParam('emitRate', this.value)">
                    <span class="value-display" id="emitRate-value">4</span>
                </div>
            </div>

            <div class="control-group">
                <label>Particle Life</label>
                <div class="slider-container">
                    <input type="range" id="particleLife" min="30" max="200" step="5" value="95" oninput="updateParam('particleLife', this.value)">
                    <span class="value-display" id="particleLife-value">95</span>
                </div>
            </div>

            <div class="control-group">
                <label>Dust Scale</label>
                <div class="slider-container">
                    <input type="range" id="dustSize" min="6" max="60" step="1" value="28" oninput="updateParam('dustSize', this.value)">
                    <span class="value-display" id="dustSize-value">28</span>
                </div>
            </div>

            <div class="control-group">
                <label>Turbulence</label>
                <div class="slider-container">
                    <input type="range" id="turbulence" min="0" max="2.5" step="0.1" value="0.6" oninput="updateParam('turbulence', this.value)">
                    <span class="value-display" id="turbulence-value">0.6</span>
                </div>
            </div>

            <div class="control-group">
                <label>Trail Fade</label>
                <div class="slider-container">
                    <input type="range" id="trailFade" min="2" max="40" step="1" value="12" oninput="updateParam('trailFade', this.value)">
                    <span class="value-display" id="trailFade-value">12</span>
                </div>
            </div>
        </div>

        <!-- Wheel legend -->
        <div class="control-section">
            <h3>Contact Points</h3>
            <div class="wheel-legend">
                <div class="wl-item"><div class="wl-dot" style="background:#d4aa76"></div>FL — warm clay</div>
                <div class="wl-item"><div class="wl-dot" style="background:#dcb87e"></div>FR — golden sand</div>
                <div class="wl-item"><div class="wl-dot" style="background:#c4965a"></div>RL — ochre earth</div>
                <div class="wl-item"><div class="wl-dot" style="background:#c88050"></div>RR — burnt sienna</div>
            </div>
        </div>

        <!-- Actions -->
        <div class="control-section">
            <h3>Actions</h3>
            <div class="button-row">
                <button class="button secondary" onclick="resetParameters()">Reset</button>
                <button class="button" onclick="doSave()">Save PNG</button>
            </div>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-area">
        <div id="canvas-container">
            <div class="loading" id="loading-msg">Summoning the earthwake…</div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// TERRAL BLOOM — Generative Dust System
//
// A four-node formation (FL/FR/RL/RR wheels in chassis geometry) wanders
// an organic Perlin-noise path. Each node continuously emits dust
// particles that spray backward, drift under turbulence, expand, cool
// in color, and dissolve — recording the invisible grammar of contact
// between mechanical force and ground matter.
// ═══════════════════════════════════════════════════════════════════════

let params = {
    seed:         12345,
    speed:        1.8,
    emitRate:     4,
    particleLife: 95,
    dustSize:     28,
    turbulence:   0.6,
    trailFade:    12,
};
const defaultParams = { ...params };

// Formation state
let cx, cy, headingAngle, noiseOffset, currentSpeed;
let particles = [];
let warmColors, coolColor;

// Fixed chassis proportions (tuned for 1200px canvas)
const WHEEL_SPAN = 50;   // half track-width in px
const AXLE_SPAN  = 40;   // half wheelbase in px

// ── Dust Particle ────────────────────────────────────────────────────

class DustParticle {
    constructor(x, y, wheelIdx, formSpd) {
        // Born at wheel contact, with small spatial jitter so the source breathes
        this.x = x + random(-5, 5);
        this.y = y + random(-5, 5);
        this.wi = wheelIdx; // 0=FL 1=FR 2=RL 3=RR

        // Spray backward from heading in a perturbed cone
        let backAngle = headingAngle + PI + random(-0.48, 0.48);
        let spd = max(0.5, formSpd) * random(0.45, 1.9) + random(0.4, 1.8);
        this.vx = cos(backAngle) * spd;
        this.vy = sin(backAngle) * spd;

        // Lateral outward kick — left wheels kick left, right wheels kick right
        // This encodes the wheel polarity directly into the particle's birth momentum
        let lateralSign = (wheelIdx % 2 === 0) ? -1 : 1;
        let perpX = -sin(headingAngle);
        let perpY =  cos(headingAngle);
        let lStr = random(0.08, 0.55) * lateralSign;
        this.vx += perpX * lStr;
        this.vy += perpY * lStr;

        // Private noise coordinates (unique per particle → unique turbulence path)
        this.nx = random(10000);
        this.ny = random(20000);

        this.age    = 0;
        this.maxAge = params.particleLife * random(0.78, 1.22);

        // Front wheels pressed harder → slightly larger particles
        let szMult   = (wheelIdx < 2) ? 1.18 : 1.0;
        this.initR   = random(1.5, 3.8) * szMult;
        this.alive   = true;
    }

    update() {
        this.age++;
        if (this.age >= this.maxAge) { this.alive = false; return; }

        // Perlin turbulence — sampled at unique offset so particles diverge organically
        let nt = this.age * 0.023;
        let tx = (noise(this.nx + nt) - 0.5) * params.turbulence * 1.5;
        let ty = (noise(this.ny + nt) - 0.5) * params.turbulence * 1.5;
        this.vx += tx;
        this.vy += ty;

        // Air resistance — momentum bleeds away, the cloud softens
        this.vx *= 0.942;
        this.vy *= 0.942;

        this.x += this.vx;
        this.y += this.vy;
    }

    display() {
        let t = this.age / this.maxAge; // 0 → 1

        // Alpha: vivid at birth, long slow dissolution (pow < 1 = concave fade)
        let alpha = pow(1 - t, 0.68) * 215;

        // Radius: grain grows into cloud (eased so early growth is fast, late growth slow)
        let r = lerp(this.initR, params.dustSize, pow(t, 0.40));

        // Color: warm earth birth → cool dark loam death
        let bC = warmColors[this.wi];
        let dC = coolColor;
        let cr = lerp(red(bC),   red(dC),   t);
        let cg = lerp(green(bC), green(dC), t);
        let cb = lerp(blue(bC),  blue(dC),  t);

        noStroke();
        fill(cr, cg, cb, alpha);
        ellipse(this.x, this.y, r * 2, r * 2);
    }
}

// ── Formation (Chassis) ──────────────────────────────────────────────

function updateFormation() {
    let t = noiseOffset;

    // Two independent noise channels → organic velocity field
    let nvx = (noise(t * 0.55) - 0.5) * 2;
    let nvy = (noise(t * 0.55 + 314.159) - 0.5) * 2;

    // Slow speed envelope → breathing acceleration/deceleration feel
    let spdMod = 0.42 + noise(t * 0.11 + 99.9) * 1.35;

    // Boundary repulsion gradient — smooth inward turn near canvas edges
    let margin = 140;
    let bx = 0, by = 0;
    if (cx < margin)               bx =  pow((margin - cx) / margin, 1.4) * 2.0;
    else if (cx > width - margin)  bx = -pow((cx - (width - margin)) / margin, 1.4) * 2.0;
    if (cy < margin)               by =  pow((margin - cy) / margin, 1.4) * 2.0;
    else if (cy > height - margin) by = -pow((cy - (height - margin)) / margin, 1.4) * 2.0;

    let vx = (nvx + bx) * spdMod * params.speed * 3.6;
    let vy = (nvy + by) * spdMod * params.speed * 3.6;

    cx += vx;
    cy += vy;
    currentSpeed = sqrt(vx * vx + vy * vy);
    if (currentSpeed > 0.18) headingAngle = atan2(vy, vx);

    noiseOffset += 0.0082;
}

// ── Wheel Contact Positions ──────────────────────────────────────────

function wheelPositions() {
    let fwdX =  cos(headingAngle), fwdY =  sin(headingAngle);
    let rgtX = -sin(headingAngle), rgtY =  cos(headingAngle);
    return [
        { x: cx + fwdX * AXLE_SPAN - rgtX * WHEEL_SPAN,
          y: cy + fwdY * AXLE_SPAN - rgtY * WHEEL_SPAN },  // FL
        { x: cx + fwdX * AXLE_SPAN + rgtX * WHEEL_SPAN,
          y: cy + fwdY * AXLE_SPAN + rgtY * WHEEL_SPAN },  // FR
        { x: cx - fwdX * AXLE_SPAN - rgtX * WHEEL_SPAN,
          y: cy - fwdY * AXLE_SPAN - rgtY * WHEEL_SPAN },  // RL
        { x: cx - fwdX * AXLE_SPAN + rgtX * WHEEL_SPAN,
          y: cy - fwdY * AXLE_SPAN + rgtY * WHEEL_SPAN },  // RR
    ];
}

// ── Emit Particles ───────────────────────────────────────────────────

function emitParticles() {
    if (currentSpeed < 0.28) return;
    let w = wheelPositions();
    let rate = floor(params.emitRate);
    for (let wi = 0; wi < 4; wi++) {
        for (let j = 0; j < rate; j++) {
            if (particles.length < 9000) {
                particles.push(new DustParticle(w[wi].x, w[wi].y, wi, currentSpeed));
            }
        }
    }
}

// ── Draw Chassis Overlay ─────────────────────────────────────────────

function drawChassis() {
    let w = wheelPositions();

    // Subtle chassis body outline
    let fwdX = cos(headingAngle), fwdY = sin(headingAngle);
    let rgtX = -sin(headingAngle), rgtY = cos(headingAngle);

    // Draw chassis rectangle (very low opacity — concept anchor)
    let corners = [
        { x: cx + fwdX * (AXLE_SPAN + 6) - rgtX * (WHEEL_SPAN + 8),
          y: cy + fwdY * (AXLE_SPAN + 6) - rgtY * (WHEEL_SPAN + 8) },
        { x: cx + fwdX * (AXLE_SPAN + 6) + rgtX * (WHEEL_SPAN + 8),
          y: cy + fwdY * (AXLE_SPAN + 6) + rgtY * (WHEEL_SPAN + 8) },
        { x: cx - fwdX * (AXLE_SPAN + 6) + rgtX * (WHEEL_SPAN + 8),
          y: cy - fwdY * (AXLE_SPAN + 6) + rgtY * (WHEEL_SPAN + 8) },
        { x: cx - fwdX * (AXLE_SPAN + 6) - rgtX * (WHEEL_SPAN + 8),
          y: cy - fwdY * (AXLE_SPAN + 6) - rgtY * (WHEEL_SPAN + 8) },
    ];
    stroke(200, 180, 140, 22);
    strokeWeight(1);
    noFill();
    beginShape();
    for (let c of corners) vertex(c.x, c.y);
    endShape(CLOSE);

    // 4 contact-point glows — small, luminous, barely-there
    noStroke();
    for (let wi = 0; wi < 4; wi++) {
        let px = w[wi].x, py = w[wi].y;
        // Outer halo
        fill(220, 190, 130, 28);
        ellipse(px, py, 18, 18);
        // Core spark
        fill(255, 240, 190, 90);
        ellipse(px, py, 5, 5);
    }

    // Direction indicator — very faint forward arrow stub
    let arrowLen = AXLE_SPAN + 22;
    stroke(220, 180, 120, 18);
    strokeWeight(1.5);
    line(cx, cy,
         cx + fwdX * arrowLen,
         cy + fwdY * arrowLen);
    noStroke();
}

// ── p5.js Lifecycle ──────────────────────────────────────────────────

function setup() {
    let canvas = createCanvas(1200, 1200);
    canvas.parent('canvas-container');
    document.getElementById('loading-msg').style.display = 'none';
    initializeSystem();
}

function initializeSystem() {
    randomSeed(params.seed);
    noiseSeed(params.seed);

    particles = [];
    cx = width  / 2;
    cy = height / 2;
    headingAngle = random(TWO_PI);
    noiseOffset  = random(100, 800);
    currentSpeed = 0;

    // Earth-warm birth palette per wheel; unified dark loam as death colour
    warmColors = [
        color('#d4aa76'),  // FL — warm clay
        color('#dcb87e'),  // FR — golden sand
        color('#c4965a'),  // RL — ochre earth
        color('#c88050'),  // RR — burnt sienna
    ];
    coolColor = color('#4a4038'); // settled dark loam

    background(15, 12, 9);

    // Pre-run 260 frames so the canvas blooms fully before the user sees it —
    // they enter mid-journey rather than an empty void.
    for (let i = 0; i < 260; i++) {
        updateFormation();
        emitParticles();
        let live = [];
        for (let p of particles) {
            p.update();
            if (p.alive) live.push(p);
        }
        particles = live;
    }
}

function draw() {
    // Fade overlay accumulates ghost history.
    // Low trailFade → long memory; high trailFade → ephemeral present.
    fill(15, 12, 9, params.trailFade);
    noStroke();
    rect(0, 0, width, height);

    // Advance formation along its noise-driven path
    updateFormation();

    // Birth new particles from each wheel contact point
    emitParticles();

    // Tick, cull, render all particles
    let live = [];
    for (let p of particles) {
        p.update();
        if (p.alive) {
            p.display();
            live.push(p);
        }
    }
    particles = live;

    // Overlay the chassis ghost (very subtle — concept anchor)
    drawChassis();
}

// ═══════════════════════════════════════════════════════════════════════
// UI HANDLERS
// ═══════════════════════════════════════════════════════════════════════

function updateParam(paramName, value) {
    params[paramName] = parseFloat(value);
    let display = params[paramName];
    let el = document.getElementById(paramName + '-value');
    if (el) el.textContent = Number.isInteger(display)
        ? display
        : display.toFixed(1);
}

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
    let v = parseInt(document.getElementById('seed-input').value);
    if (v && v > 0) { params.seed = v; initializeSystem(); }
    else updateSeedDisplay();
}

function previousSeed() {
    params.seed = Math.max(1, params.seed - 1);
    updateSeedDisplay(); initializeSystem();
}

function nextSeed() {
    params.seed += 1;
    updateSeedDisplay(); initializeSystem();
}

function randomSeedAndUpdate() {
    params.seed = Math.floor(Math.random() * 999999) + 1;
    updateSeedDisplay(); initializeSystem();
}

function resetParameters() {
    params = { ...defaultParams };
    const setSlider = (id, val) => {
        let el = document.getElementById(id);
        if (el) { el.value = val; }
        let vEl = document.getElementById(id + '-value');
        if (vEl) vEl.textContent = Number.isInteger(val) ? val : val.toFixed(1);
    };
    setSlider('speed',        params.speed);
    setSlider('emitRate',     params.emitRate);
    setSlider('particleLife', params.particleLife);
    setSlider('dustSize',     params.dustSize);
    setSlider('turbulence',   params.turbulence);
    setSlider('trailFade',    params.trailFade);
    updateSeedDisplay();
    initializeSystem();
}

function doSave() {
    saveCanvas('terral-bloom-' + params.seed, 'png');
}

window.addEventListener('load', () => updateSeedDisplay());
</script>
</body>
</html>
